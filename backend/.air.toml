root = "."
tmp_dir = "/tmp/notarize-air"

[build]
cmd = "go build -o /tmp/notarize-air/server ./cmd/server"
entrypoint = "/tmp/notarize-air/server"
include_ext = ["go"]
exclude_dir = ["tmp", "vendor", "testdata"]
stop_on_error = true
send_interrupt = true
kill_delay = "1s"
delay = 200

[log]
time = true
