openapi: 3.0.3
info:
  title: notarize Approval & Review API
  version: 0.1.0
  description: >
    Spec-first contract for the `notarize` document notarization and multi-step
    approval platform. Designed for openapi code generation. Each approval
    decision is recorded with a detached digital signature over a canonical,
    replay-resistant payload.
servers:
  - url: /api/v1

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      operationId: login
      summary: Exchange credentials for a bearer token
      description: >
        Public endpoint. Verifies email + password and returns a signed JWT to be
        sent as `Authorization: Bearer <token>` on subsequent requests.
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentication succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        default:
          $ref: "#/components/responses/Error"

  /documents:
    get:
      operationId: listDocuments
      summary: List documents
      tags: [documents]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: issueId
          in: query
          required: false
          description: Filter to documents in this issue.
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DocumentStatus"
      responses:
        "200":
          description: A page of documents.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentPage"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createDocument
      summary: Upload a new document
      description: >
        Uploads file content via multipart/form-data. The server stores the
        bytes in object storage, computes the SHA-256 digest, and returns the
        created document. That digest is the value later bound by approval
        signatures.
      tags: [documents]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, issue_id]
              properties:
                file:
                  type: string
                  format: binary
                  description: Raw document bytes.
                name:
                  type: string
                  description: Display name; defaults to the uploaded filename.
                issue_id:
                  type: string
                  format: uuid
                  description: Issue the document is uploaded into.
      responses:
        "201":
          description: Document created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        default:
          $ref: "#/components/responses/Error"

  /documents/{documentId}:
    parameters:
      - $ref: "#/components/parameters/DocumentId"
    get:
      operationId: getDocument
      summary: Fetch document metadata
      tags: [documents]
      responses:
        "200":
          description: The document.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        default:
          $ref: "#/components/responses/Error"

  /documents/{documentId}/content:
    parameters:
      - $ref: "#/components/parameters/DocumentId"
    get:
      operationId: downloadDocumentContent
      summary: Download raw document bytes
      tags: [documents]
      responses:
        "200":
          description: Document bytes.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        default:
          $ref: "#/components/responses/Error"

  /documents/{documentId}/result:
    parameters:
      - $ref: "#/components/parameters/DocumentId"
    get:
      operationId: getDocumentResult
      summary: Get the parsing job status and extracted output for a document
      tags: [documents]
      responses:
        "200":
          description: The parsing job status, and its output once complete.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentResult"
        default:
          $ref: "#/components/responses/Error"

  /documents/{documentId}/move:
    parameters:
      - $ref: "#/components/parameters/DocumentId"
    post:
      operationId: moveDocument
      summary: Move a document to a different issue
      tags: [documents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveDocumentRequest"
      responses:
        "200":
          description: The updated document.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        default:
          $ref: "#/components/responses/Error"

  /documents/{documentId}/reprocess:
    parameters:
      - $ref: "#/components/parameters/DocumentId"
    post:
      operationId: reprocessDocument
      summary: Re-queue the parsing job for a document
      tags: [documents]
      responses:
        "200":
          description: The re-queued parsing job status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentResult"
        default:
          $ref: "#/components/responses/Error"

  /projects:
    get:
      operationId: listProjects
      summary: List projects
      tags: [projects]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: A page of projects.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectPage"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createProject
      summary: Create a project
      tags: [projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Error"

  /projects/{projectId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getProject
      summary: Fetch a project
      tags: [projects]
      responses:
        "200":
          description: The project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Error"
    patch:
      operationId: updateProject
      summary: Rename a project
      description: Partial update. Omit a field to leave it unchanged.
      tags: [projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: The updated project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteProject
      summary: Delete a project
      description: >
        Cascades: deletes the project's issues, their documents, and any
        approval processes bound to those documents.
      tags: [projects]
      responses:
        "204":
          description: Project deleted.
        default:
          $ref: "#/components/responses/Error"

  /issues:
    get:
      operationId: listIssues
      summary: List issues
      tags: [issues]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: projectId
          in: query
          required: false
          description: Filter to issues in this project.
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IssueStatus"
      responses:
        "200":
          description: A page of issues.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuePage"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createIssue
      summary: Create an issue
      tags: [issues]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIssueRequest"
      responses:
        "201":
          description: Issue created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
        default:
          $ref: "#/components/responses/Error"

  /issues/{issueId}:
    parameters:
      - $ref: "#/components/parameters/IssueId"
    get:
      operationId: getIssue
      summary: Fetch an issue
      tags: [issues]
      responses:
        "200":
          description: The issue.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
        default:
          $ref: "#/components/responses/Error"
    patch:
      operationId: updateIssue
      summary: Update an issue
      description: >
        Partial update. Omit a field to leave it unchanged. Setting `project_id`
        moves the issue to another project.
      tags: [issues]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIssueRequest"
      responses:
        "200":
          description: The updated issue.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteIssue
      summary: Delete an issue
      description: >
        Cascades: deletes the issue's documents and any approval processes
        bound to those documents.
      tags: [issues]
      responses:
        "204":
          description: Issue deleted.
        default:
          $ref: "#/components/responses/Error"

  /users:
    get:
      operationId: listUsers
      summary: List users
      tags: [users]
      security:
        - bearerAuth: [ADMIN]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: role
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UserRole"
      responses:
        "200":
          description: A page of users.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPage"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createUser
      summary: Create a user
      tags: [users]
      security:
        - bearerAuth: [ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        default:
          $ref: "#/components/responses/Error"

  /users/{userId}:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      operationId: getUser
      summary: Fetch a user
      tags: [users]
      responses:
        "200":
          description: The user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        default:
          $ref: "#/components/responses/Error"
    patch:
      operationId: updateUser
      summary: Update a user
      description: Partial update. Omit a field to leave it unchanged.
      tags: [users]
      security:
        - bearerAuth: [ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: The updated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteUser
      summary: Delete a user
      tags: [users]
      security:
        - bearerAuth: [ADMIN]
      responses:
        "204":
          description: User deleted.
        default:
          $ref: "#/components/responses/Error"

  /approval-processes:
    get:
      operationId: listApprovalProcesses
      summary: List approval processes
      tags: [approvals]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: documentId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProcessStatus"
      responses:
        "200":
          description: A page of approval processes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalProcessPage"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createApprovalProcess
      summary: Start an approval process for a document
      description: >
        Binds a document to an ordered list of approval steps, defined inline
        (configurable per process). The first step becomes ACTIVE; the rest
        are PENDING.
      tags: [approvals]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApprovalProcessRequest"
      responses:
        "201":
          description: Process created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalProcess"
        default:
          $ref: "#/components/responses/Error"

  /approval-processes/{processId}:
    parameters:
      - $ref: "#/components/parameters/ProcessId"
    get:
      operationId: getApprovalProcess
      summary: Fetch an approval process
      tags: [approvals]
      responses:
        "200":
          description: The process.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalProcess"
        default:
          $ref: "#/components/responses/Error"

  /approval-processes/{processId}/cancel:
    parameters:
      - $ref: "#/components/parameters/ProcessId"
    post:
      operationId: cancelApprovalProcess
      summary: Cancel an in-flight process
      tags: [approvals]
      responses:
        "200":
          description: The cancelled process.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalProcess"
        default:
          $ref: "#/components/responses/Error"

  /approval-processes/{processId}/steps/{stepId}/decisions:
    parameters:
      - $ref: "#/components/parameters/ProcessId"
      - $ref: "#/components/parameters/StepId"
    post:
      operationId: submitDecision
      summary: Submit a signed approve/reject decision
      security:
        - bearerAuth: [ADMIN, MANAGER]
      description: >
        Records an actor's decision on an ACTIVE step. The actor is taken from
        the auth token, never from the body. The server reconstructs the
        canonical approval payload, verifies the signature against the actor's
        registered key and the document digest, then persists. When the step's
        policy is satisfied the process advances; a REJECT terminates it.
      tags: [approvals]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitDecisionRequest"
      responses:
        "201":
          description: Decision recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Decision"
        default:
          $ref: "#/components/responses/Error"

  /approval-processes/{processId}/comments:
    parameters:
      - $ref: "#/components/parameters/ProcessId"
    get:
      operationId: listProcessComments
      summary: List review comments on a process
      tags: [reviews]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: A page of comments.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewCommentPage"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createProcessComment
      summary: Add a review comment
      description: >
        Lightweight, non-binding commentary on a process or one of its steps,
        distinct from a formal signed decision.
      tags: [reviews]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewCommentRequest"
      responses:
        "201":
          description: Comment created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewComment"
        default:
          $ref: "#/components/responses/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 200
        default: 50
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 0
        default: 0
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProcessId:
      name: processId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    StepId:
      name: stepId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IssueId:
      name: issueId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      required: [error_code, message]
      properties:
        error_code:
          type: string
          description: Stable machine-readable code, e.g. `document_not_found`.
        message:
          type: string
        request_id:
          type: string
          nullable: true

    DocumentStatus:
      type: string
      enum: [UPLOADED, IN_REVIEW, APPROVED, REJECTED, ARCHIVED]
    ProcessingStatus:
      type: string
      enum: [QUEUED, PROCESSING, DONE, FAILED]
    DocumentResult:
      type: object
      required: [status]
      properties:
        status: { $ref: "#/components/schemas/ProcessingStatus" }
        error:
          type: string
          nullable: true
          description: Failure reason, set when status is FAILED.
        output:
          type: string
          nullable: true
          description: Extracted markdown, present once status is DONE.
    IssueStatus:
      type: string
      enum: [OPEN, IN_PROGRESS, CLOSED]
    UserRole:
      type: string
      enum: [ADMIN, MANAGER, EMPLOYEE, INVITEE]
    ProcessStatus:
      type: string
      enum: [PENDING, IN_PROGRESS, APPROVED, REJECTED, CANCELLED]
    StepStatus:
      type: string
      enum: [PENDING, ACTIVE, APPROVED, REJECTED, SKIPPED]
    StepPolicy:
      type: string
      description: >
        ANY = one approval satisfies the step. ALL = every assignee must
        approve. QUORUM = `required_approvals` approvals needed.
      enum: [ANY, ALL, QUORUM]
    DecisionType:
      type: string
      enum: [APPROVE, REJECT]
    SignatureAlgorithm:
      type: string
      enum: [ED25519, ECDSA_P256_SHA256, RSA_PSS_SHA256]

    Document:
      type: object
      required:
        [
          id,
          name,
          content_type,
          size_bytes,
          sha256,
          issue_id,
          status,
          created_by,
          created_at,
          updated_at,
        ]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        content_type: { type: string }
        size_bytes: { type: integer, format: int64 }
        sha256:
          type: string
          description: Lowercase hex SHA-256 digest of the stored bytes.
        issue_id:
          type: string
          format: uuid
          description: Issue this document belongs to.
        status: { $ref: "#/components/schemas/DocumentStatus" }
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    DocumentPage:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Document" }
        total:
          type: integer
          format: int32
          description: Total matching rows, ignoring limit/offset.

    Project:
      type: object
      required: [id, name, created_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ProjectPage:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Project" }
        total:
          type: integer
          format: int32
          description: Total matching rows, ignoring limit/offset.
    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
    UpdateProjectRequest:
      type: object
      description: Partial update; omit a field to leave it unchanged.
      properties:
        name: { type: string }

    Issue:
      type: object
      required:
        [id, project_id, title, status, created_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        title: { type: string }
        description:
          type: string
          nullable: true
        status: { $ref: "#/components/schemas/IssueStatus" }
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    IssuePage:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Issue" }
        total:
          type: integer
          format: int32
          description: Total matching rows, ignoring limit/offset.
    CreateIssueRequest:
      type: object
      required: [project_id, title]
      properties:
        project_id: { type: string, format: uuid }
        title: { type: string }
        description:
          type: string
          nullable: true
    UpdateIssueRequest:
      type: object
      description: Partial update; omit a field to leave it unchanged.
      properties:
        title: { type: string }
        description:
          type: string
          nullable: true
        status: { $ref: "#/components/schemas/IssueStatus" }
        project_id:
          type: string
          format: uuid
          description: Move the issue to another project.
    MoveDocumentRequest:
      type: object
      required: [issue_id]
      properties:
        issue_id:
          type: string
          format: uuid
          description: Destination issue.

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
    LoginResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: Signed JWT bearer token.
        user: { $ref: "#/components/schemas/User" }

    User:
      type: object
      required:
        [id, email, first_name, last_name, role, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        first_name: { type: string }
        last_name: { type: string }
        role: { $ref: "#/components/schemas/UserRole" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    UserPage:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/User" }
        total:
          type: integer
          format: int32
          description: Total matching rows, ignoring limit/offset.
    CreateUserRequest:
      type: object
      required: [email, first_name, last_name, password]
      properties:
        email: { type: string, format: email }
        first_name: { type: string }
        last_name: { type: string }
        password:
          type: string
          format: password
          description: Plaintext password; the server stores only a hash.
        role:
          allOf:
            - $ref: "#/components/schemas/UserRole"
          description: Defaults to EMPLOYEE when omitted.
    UpdateUserRequest:
      type: object
      description: Partial update; omit a field to leave it unchanged.
      properties:
        first_name: { type: string }
        last_name: { type: string }
        role: { $ref: "#/components/schemas/UserRole" }

    StepDefinition:
      type: object
      required: [name, policy, approver_user_ids]
      properties:
        name: { type: string }
        policy: { $ref: "#/components/schemas/StepPolicy" }
        required_approvals:
          type: integer
          format: int32
          nullable: true
          description: Required only when policy is QUORUM.
        approver_user_ids:
          type: array
          items: { type: string, format: uuid }
        approver_roles:
          type: array
          items: { type: string }
    CreateApprovalProcessRequest:
      type: object
      required: [document_id, steps]
      properties:
        document_id: { type: string, format: uuid }
        steps:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/StepDefinition" }

    ApprovalProcess:
      type: object
      required:
        [id, document_id, status, steps, created_by, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        document_id: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/ProcessStatus" }
        current_step_index:
          type: integer
          format: int32
          nullable: true
          description: Index of the ACTIVE step, or null if finished/cancelled.
        steps:
          type: array
          items: { $ref: "#/components/schemas/ProcessStep" }
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ProcessStep:
      type: object
      required: [id, index, name, policy, status, approver_user_ids, decisions]
      properties:
        id: { type: string, format: uuid }
        index: { type: integer, format: int32 }
        name: { type: string }
        policy: { $ref: "#/components/schemas/StepPolicy" }
        required_approvals:
          type: integer
          format: int32
          nullable: true
        status: { $ref: "#/components/schemas/StepStatus" }
        approver_user_ids:
          type: array
          items: { type: string, format: uuid }
        approver_roles:
          type: array
          items: { type: string }
        decisions:
          type: array
          items: { $ref: "#/components/schemas/Decision" }
    ApprovalProcessPage:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ApprovalProcess" }
        total:
          type: integer
          format: int32
          description: Total matching rows, ignoring limit/offset.

    SignatureInput:
      type: object
      required: [algorithm, value, key_id]
      description: >
        Detached signature produced by the approver. The signed message is the
        canonical approval payload constructed server-side as UTF-8 of:
        `notarize-approval-v1\n{document_sha256}\n{process_id}\n{step_id}\n{decision_type}\n{actor_id}`.
        Binding all five fields prevents replaying a signature across documents,
        processes, steps, decision types, or actors.
      properties:
        algorithm: { $ref: "#/components/schemas/SignatureAlgorithm" }
        value:
          type: string
          description: Base64-encoded detached signature bytes.
        key_id:
          type: string
          description: Identifier of the approver's registered public key.
        certificate:
          type: string
          nullable: true
          description: Optional base64 (DER) signing certificate.
    Signature:
      type: object
      required: [algorithm, value, key_id, signed_payload_sha256, signed_at]
      properties:
        algorithm: { $ref: "#/components/schemas/SignatureAlgorithm" }
        value: { type: string }
        key_id: { type: string }
        certificate:
          type: string
          nullable: true
        signed_payload_sha256:
          type: string
          description: Hex SHA-256 of the canonical payload the server verified.
        signed_at: { type: string, format: date-time }

    SubmitDecisionRequest:
      type: object
      required: [type, signature]
      properties:
        type: { $ref: "#/components/schemas/DecisionType" }
        comment:
          type: string
          nullable: true
        signature: { $ref: "#/components/schemas/SignatureInput" }
    Decision:
      type: object
      required: [id, step_id, actor_id, type, signature, created_at]
      properties:
        id: { type: string, format: uuid }
        step_id: { type: string, format: uuid }
        actor_id: { type: string, format: uuid }
        type: { $ref: "#/components/schemas/DecisionType" }
        comment:
          type: string
          nullable: true
        signature: { $ref: "#/components/schemas/Signature" }
        created_at: { type: string, format: date-time }

    CreateReviewCommentRequest:
      type: object
      required: [body]
      properties:
        body: { type: string }
        step_id:
          type: string
          format: uuid
          nullable: true
    ReviewComment:
      type: object
      required: [id, process_id, author_id, body, created_at]
      properties:
        id: { type: string, format: uuid }
        process_id: { type: string, format: uuid }
        step_id:
          type: string
          format: uuid
          nullable: true
        author_id: { type: string, format: uuid }
        body: { type: string }
        created_at: { type: string, format: date-time }
    ReviewCommentPage:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ReviewComment" }
        total:
          type: integer
          format: int32
          description: Total matching rows, ignoring limit/offset.
