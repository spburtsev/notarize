name: notarize

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notarize}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notarize}
      POSTGRES_DB: ${POSTGRES_DB:-notarize}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notarize} -d ${POSTGRES_DB:-notarize}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-notarize}:${POSTGRES_PASSWORD:-notarize}@postgres:5432/${POSTGRES_DB:-notarize}?sslmode=disable
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-documents}
      S3_USE_SSL: "false"
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-change-me}
      JWT_TTL: ${JWT_TTL:-24h}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@notarize.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-changeme}
    ports:
      - "8080:8080"

volumes:
  pgdata:
  miniodata: